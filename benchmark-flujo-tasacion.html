<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark Flujo de Tasación — One Slide</title>
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
    padding: 14px 22px;
    overflow: hidden;
    color: #111827;
  }
  .wrap {
    max-width: 1380px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
  }
  .head-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .head-logo {
    height: 26px;
    width: auto;
    flex-shrink: 0;
  }
  .badge {
    display: inline-block;
    background: #1E6B3E;
    color: #fff;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: .08em;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  h1 {
    font-size: 17px;
    font-weight: 600;
    color: #111827;
    line-height: 1.2;
  }
  h1 small {
    font-size: 12px;
    color: #6B7280;
    font-weight: 400;
    margin-left: 6px;
  }
  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    color: #6B7280;
  }
  .leg-dot { font-size: 12px; line-height: 1; }

  .tbl-wrap {
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 10.5px;
  }

  col.c-label  { width: 26%; }
  col.c-clicar { width: 9.5%; }
  col.c-ref    { width: 10.75%; }

  thead tr th {
    background: #1E6B3E;
    color: #fff;
    font-weight: 600;
    font-size: 10.5px;
    padding: 6px 4px;
    text-align: center;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  thead tr th.th-label {
    text-align: left;
    padding-left: 10px;
    color: #BBF7D0;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  thead tr th.th-clicar {
    border-left: 2px solid #6EE7A0;
    border-right: 2px solid #6EE7A0;
    background: #16532F;
  }

  tr.section td {
    background: #E3F2EC;
    color: #1E6B3E;
    font-weight: 600;
    font-size: 9.5px;
    letter-spacing: .04em;
    padding: 3px 10px;
    border-top: 1px solid #C5E3D0;
    border-bottom: 1px solid #C5E3D0;
    text-transform: uppercase;
    line-height: 1;
  }

  tr.row-even td { background: #FAFBFC; }
  tr.row-odd  td { background: #FFFFFF; }

  td.td-label {
    padding: 3px 6px 3px 12px;
    color: #374151;
    font-size: 10.5px;
    line-height: 1.25;
    border-right: 1px solid #E5E7EB;
    border-bottom: 1px solid #F3F4F6;
  }

  td.td-dot {
    text-align: center;
    vertical-align: middle;
    border-bottom: 1px solid #F3F4F6;
    border-right: 1px solid #E5E7EB;
    padding: 1px 0;
    line-height: 1;
  }
  td.td-dot.clicar {
    border-left: 2px solid #1E6B3E;
    border-right: 2px solid #1E6B3E;
    background: #EAF7F0 !important;
  }

  tr.score td {
    padding: 6px 4px;
    font-weight: 700;
    font-size: 12px;
    text-align: center;
    border-top: 2px solid #374151;
  }
  tr.score td.score-label {
    background: #111827;
    color: #fff;
    text-align: left;
    padding-left: 12px;
    font-size: 10.5px;
    font-weight: 600;
  }
  tr.score td.sc-green  { background: #D1FAE5; color: #065F46; }
  tr.score td.sc-yellow { background: #FEF9C3; color: #78350F; }
  tr.score td.sc-pink   { background: #FEE2E2; color: #991B1B; }
  tr.score td.clicar    {
    border-left: 2px solid #1E6B3E !important;
    border-right: 2px solid #1E6B3E !important;
  }

  .dot { font-size: 13px; line-height: 1; }
  .g { color: #22C55E; }
  .m { color: #FBBF24; }
  .b { color: #EF4444; }
  .n { color: #94A3B8; }

  .footnote {
    font-size: 9.5px;
    color: #9CA3AF;
    text-align: right;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="head-left">
      <img src="clicar-logo.png" alt="Clicar" class="head-logo">
      <span class="badge">Síntesis comparativa</span>
      <h1>Tabla maestra · 24 criterios × 7 referentes <small>Auditoría UX/UI · Abril 2026</small></h1>
    </div>
    <div class="legend">
      <div class="leg-item"><span class="leg-dot g">●</span> Cumple</div>
      <div class="leg-item"><span class="leg-dot m">●</span> Parcial</div>
      <div class="leg-item"><span class="leg-dot b">●</span> No cumple</div>
      <div class="leg-item"><span class="leg-dot n">●</span> N/A</div>
      <div class="leg-item" style="border-left:1px solid #E5E7EB;padding-left:12px;">Score · ✓=1 · ⚠=0,5 · ✗=0</div>
    </div>
  </div>

  <div class="tbl-wrap">
    <table>
      <colgroup>
        <col class="c-label">
        <col class="c-clicar">
        <col class="c-ref"><col class="c-ref"><col class="c-ref">
        <col class="c-ref"><col class="c-ref"><col class="c-ref">
      </colgroup>
      <thead>
        <tr>
          <th class="th-label">Dimensión de análisis</th>
          <th class="th-clicar">Clicar</th>
          <th>Kavak</th>
          <th>Bruno F.</th>
          <th>TrueCar</th>
          <th>DFSK</th>
          <th>Salfa</th>
          <th>Gilde.</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const G='g', M='m', B='b', N='n';

const sections = [
  { title: 'Propuesta de valor y entrada al flujo', rows: [
    ['Propósito declarado desde el inicio',                  [B,M,M,M,G,B,G]],
    ['Criterios de elegibilidad visibles antes de iniciar',  [B,B,M,B,M,B,M]],
  ]},
  { title: 'Entrada del vehículo', rows: [
    ['Autocompletado de datos desde patente o VIN',          [B,B,G,G,G,G,G]],
    ['Cambio de campos sin bloquear el flujo',               [B,M,G,M,B,G,G]],
    ['Control de entrada del kilometraje',                   [M,M,G,G,B,M,M]],
    ['Preguntas de condición del vehículo',                  [B,B,B,M,M,B,B]],
  ]},
  { title: 'Indicador de progreso', rows: [
    ['Visibilidad del progreso en el flujo',                 [M,B,G,M,G,M,G]],
  ]},
  { title: 'Captura de datos personales y autenticación', rows: [
    ['Momento en que se piden los datos personales',         [M,G,B,M,B,M,M]],
    ['Campo de teléfono integrado en el formulario',         [B,G,G,N,M,G,G]],
    ['Validación de RUT / identidad',                        [M,M,G,N,B,M,G]],
    ['Datos de contacto repetidos en agendamiento',          [B,G,G,G,G,G,G]],
  ]},
  { title: 'Precio y oferta', rows: [
    ['Precio mostrado antes de pedir datos de contacto',     [B,B,B,B,B,B,B]],
    ['Tipo de precio mostrado',                              [M,G,G,B,B,G,B]],
    ['Claridad y contexto del precio mostrado',              [B,G,G,N,N,M,N]],
    ['Verificación de calculabilidad antes de iniciar',      [M,M,M,B,B,M,B]],
  ]},
  { title: 'Agendamiento y selección de sucursal', rows: [
    ['Título del paso de agendamiento',                      [B,G,G,N,N,N,N]],
    ['Filtrado de sucursales',                               [M,G,M,N,B,G,G]],
    ['Selector de fecha y hora',                             [B,G,G,N,N,N,N]],
  ]},
  { title: 'Experiencia mobile', rows: [
    ['Diseño y prueba mobile-first',                         [M,M,G,G,B,G,G]],
    ['Botón de WhatsApp flotante (interferencia)',            [B,N,N,N,G,M,G]],
    ['Localización (español chileno nativo)',                 [M,B,G,B,M,G,M]],
    ['Soporte humano accesible durante el flujo',            [M,B,G,B,G,G,M]],
  ]},
  { title: 'Pantalla de confirmación', rows: [
    ['Calidad de la pantalla de éxito',                      [M,G,M,B,B,B,B]],
    ['Vigencia de la tasación comunicada',                   [G,M,B,N,B,M,B]],
    ['Consistencia de nomenclatura en el flujo',             [B,G,G,G,B,G,G]],
  ]},
  { title: 'Elemento diferenciador y error más costoso', rows: [
    ['Mayor fortaleza del flujo',                            [G,G,G,G,G,G,G]],
    ['Error más costoso para la conversión',                 [B,B,B,B,B,B,B]],
  ]},
];

const dotHtml = t => `<span class="dot ${t}">●</span>`;

function calcScore(colIdx) {
  let s = 0;
  for (const sec of sections)
    for (const [, cells] of sec.rows) {
      if (cells[colIdx] === G) s += 1;
      else if (cells[colIdx] === M) s += 0.5;
    }
  return s;
}

const total = sections.reduce((a, s) => a + s.rows.length, 0);

function scoreClass(col) {
  const pct = calcScore(col) / total;
  if (pct >= 0.55) return 'sc-green';
  if (pct >= 0.35) return 'sc-yellow';
  return 'sc-pink';
}

function fmtScore(col) {
  const s = calcScore(col);
  return `${s}/${total}`;
}

const tbody = document.getElementById('tbody');
let rowIdx = 0;

for (const sec of sections) {
  const sr = document.createElement('tr');
  sr.className = 'section';
  sr.innerHTML = `<td colspan="8">${sec.title}</td>`;
  tbody.appendChild(sr);

  for (const [label, cells] of sec.rows) {
    const tr = document.createElement('tr');
    tr.className = rowIdx % 2 === 0 ? 'row-even' : 'row-odd';
    const [cli, ...rest] = cells;
    tr.innerHTML =
      `<td class="td-label">${label}</td>` +
      `<td class="td-dot clicar">${dotHtml(cli)}</td>` +
      rest.map(t => `<td class="td-dot">${dotHtml(t)}</td>`).join('');
    tbody.appendChild(tr);
    rowIdx++;
  }
}

const scoreRow = document.createElement('tr');
scoreRow.className = 'score';
scoreRow.innerHTML =
  `<td class="score-label">Score / ${total} criterios</td>` +
  [0,1,2,3,4,5,6].map(i =>
    `<td class="${scoreClass(i)}${i === 0 ? ' clicar' : ''}">${fmtScore(i)}</td>`
  ).join('');
tbody.appendChild(scoreRow);
</script>
</body>
</html>
